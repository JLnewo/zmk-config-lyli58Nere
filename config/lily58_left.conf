
# Rol central
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1  # 1 periférico (el derecho)

# USB habilitado (solo aquí)
CONFIG_USB=y
CONFIG_ZMK_USB=y

# Bluetooth para host (perfiles BT opcionales)
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=6  # 1 periférico + 5 hosts BT
CONFIG_BT_MAX_PAIRED=6

# Widgets que requieren central (ejemplos)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y